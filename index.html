fetch("data/lotes_distritos_mapa.geojson")
  .then(response => {
    if (!response.ok) {
      throw new Error("Erro HTTP: " + response.status);
    }
    return response.json();
  })
  .then(data => {

    console.log("✅ GeoJSON carregado:", data); // DEBUG

    var layer_lotes = L.geoJson(data, {

      style: function(feature) {
        return {
          color: "#3388ff",
          weight: 1,
          fillColor: "#3388ff",
          fillOpacity: 0.4
        };
      },

      onEachFeature: function (feature, layer) {

        layer.on({
          mouseover: function(e){
            e.target.setStyle({
              fillColor: "yellow",
              fillOpacity: 0.8
            });
          },
          mouseout: function(e){
            layer_lotes.resetStyle(e.target);
          },
          click: function(e) {
            map.fitBounds(e.target.getBounds(), {padding: [50,50]});
          }
        });

        if (feature.properties) {
          layer.bindPopup(buildLotePopup(feature.properties, layer), {
            maxWidth: 320
          });
        }

      }

    });

    layer_lotes.addTo(map);
    bounds_group.addLayer(layer_lotes);

    console.log("✅ Layer adicionada ao mapa");

  })
  .catch(function(err) {
    console.error("❌ Erro ao carregar GeoJSON:", err);
    alert("Erro ao carregar os lotes. Verifique o arquivo GeoJSON.");
  });
